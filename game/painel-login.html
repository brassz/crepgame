<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <title>Painel - Login</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .card {
            background: #fff;
            border-radius: 16px;
            padding: 36px 32px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 24px 48px rgba(0,0,0,0.35);
        }
        h1 { font-size: 26px; color: #0f172a; text-align: center; margin-bottom: 6px; }
        .sub { text-align: center; color: #64748b; font-size: 14px; margin-bottom: 28px; }
        label { display: block; font-size: 13px; font-weight: 600; color: #334155; margin-bottom: 6px; }
        input {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 15px;
            margin-bottom: 16px;
        }
        input:focus { outline: none; border-color: #3b82f6; }
        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .msg {
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 16px;
            display: none;
        }
        .msg.error { display: block; background: #fee2e2; color: #991b1b; }
        .msg.success { display: block; background: #dcfce7; color: #166534; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/js/auth-config.js"></script>
</head>
<body>
    <div class="card">
        <h1>Painel Admin</h1>
        <p class="sub">Gerenciar jogadores e saldos</p>
        <div id="message" class="msg"></div>
        <form id="loginForm">
            <label for="email">Email</label>
            <input type="email" id="email" required autocomplete="email">
            <label for="password">Senha</label>
            <input type="password" id="password" required autocomplete="current-password">
            <button type="submit" id="submitBtn">Entrar</button>
        </form>
    </div>
    <script>
        if (localStorage.getItem('admin_user')) {
            window.location.href = '/painel';
        }

        const sbClient = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
        const form = document.getElementById('loginForm');
        const messageEl = document.getElementById('message');
        const submitBtn = document.getElementById('submitBtn');

        function showMsg(text, type) {
            messageEl.textContent = text;
            messageEl.className = 'msg ' + type;
        }

        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            submitBtn.disabled = true;
            submitBtn.textContent = 'Entrando...';
            messageEl.className = 'msg';

            try {
                const { data, error } = await sbClient.rpc('login_admin', {
                    p_email: email,
                    p_password: password
                });

                if (error) throw new Error(error.message);
                if (!data || !data.success) {
                    showMsg((data && data.error) || 'Email ou senha incorretos', 'error');
                    return;
                }

                localStorage.setItem('admin_user', JSON.stringify(data.user));
                window.location.href = '/painel';
            } catch (err) {
                showMsg(err.message || 'Erro ao entrar', 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Entrar';
            }
        });
    </script>
</body>
</html>
