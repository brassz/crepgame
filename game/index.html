        <!-- CRITICAL: Verificar autenticação IMEDIATAMENTE antes de qualquer coisa -->
        <script>
            // Aguardar custom-auth carregar e verificar autenticação IMEDIATAMENTE
            (function() {
                var checkCount = 0;
                var maxChecks = 100; // 10 segundos máximo para aguardar carregamento
                
                function checkAuthNow() {
                    checkCount++;
                    
                    // Se custom-auth ainda não carregou
                    if (!window.customAuth) {
                        if (checkCount < maxChecks) {
                            setTimeout(checkAuthNow, 100);
                            return;
                        }
                        // Se não carregou, apenas logar erro mas não bloquear
                        console.warn('⚠️ Sistema de autenticação ainda não carregou, mas continuando...');
                        return;
                    }
                    
                    // Verificar se está em página de auth
                    var currentPath = window.location.pathname;
                    if (currentPath.includes('login.html') || currentPath.includes('register.html')) {
                        return; // Deixar carregar normalmente
                    }
                    
                    // Verificar autenticação - mas não bloquear se ainda estiver carregando
                    try {
                        var userDataStr = localStorage.getItem('game_user');
                        var sessionToken = localStorage.getItem('game_session_token');
                        
                        if (!userDataStr || !sessionToken) {
                            // Aguardar um pouco antes de redirecionar (pode estar carregando)
                            if (checkCount < 20) {
                                setTimeout(checkAuthNow, 100);
                                return;
                            }
                            console.log('❌ Usuário não autenticado - redirecionando para login');
                            window.location.replace('login.html');
                            return;
                        }
                        
                        // Verificar expiração de sessão
                        var sessionTime = localStorage.getItem('game_session_time');
                        if (sessionTime) {
                            var elapsed = Date.now() - parseInt(sessionTime);
                            var hoursElapsed = elapsed / (1000 * 60 * 60);
                            if (hoursElapsed > 24) {
                                console.log('❌ Sessão expirada - redirecionando para login');
                                localStorage.removeItem('game_user');
                                localStorage.removeItem('game_session_token');
                                localStorage.removeItem('game_session_time');
                                window.location.replace('login.html');
                                return;
                            }
                        }
                        
                        var userData = JSON.parse(userDataStr);
                        console.log('✅ Usuário autenticado:', userData.username || userData.email);
                    } catch (e) {
                        console.error('❌ Erro ao verificar sessão:', e);
                        // Não bloquear o jogo por erro de parsing, deixar o $(document).ready tratar
                    }
                }
                
                // Iniciar verificação após um pequeno delay para permitir scripts carregarem
                setTimeout(checkAuthNow, 100);
            })();
        </script>

          <script>
            $(document).ready(function(){
                function waitAuthAndStart(attempt){
                    attempt = attempt || 0;
                    if (!window.customAuth) {
                        if (attempt < 50) {
                            setTimeout(function(){ waitAuthAndStart(attempt + 1); }, 100);
                            return;
                        }
                        console.error('❌ Sistema de autenticação não disponível');
                        window.location.replace('login.html');
                        return;
                    }

                    var currentUser = window.customAuth.getCurrentUser();
                    if (!currentUser) {
                        if (attempt < 20) {
                            setTimeout(function(){ waitAuthAndStart(attempt + 1); }, 100);
                            return;
                        }
                        console.log('❌ Usuário não autenticado - redirecionando para login');
                        window.location.replace('login.html');
                        return;
                    }

                    console.log('✅ Usuário autenticado, iniciando jogo para:', currentUser.username || currentUser.email);

                    function parseBalance(val){
                        var n = parseFloat(val);
                        return (isNaN(n) || n < 0) ? 0 : n;
                    }

                    var _bGameStarted = false;

                    function startWithBalance(balance){
                        if (_bGameStarted || window.s_oMain) {
                            console.warn('⚠️ Jogo já iniciado — ignorando nova tentativa');
                            return;
                        }
                        _bGameStarted = true;

                        try {
                            var oMain = new CMain({
                                money: parseBalance(balance),
                                min_bet: 50,
                                max_bet: 1000,
                                win_occurrence: 30,
                                time_show_dice_result: 1500,
                                casino_cash: 400,
                                show_credits: true,
                                audio_enable_on_startup: false,
                                fullscreen: true,
                                check_orientation: false,
                                num_hand_before_ads: 10
                            });

                            $(oMain).on("bet_placed", function () {});
                            $(oMain).on("clear_bet", function () {});
                            $(oMain).on("start_session", function() {
                                if(getParamValue('ctl-arcade') === "true"){
                                    parent.__ctlArcadeStartSession();
                                }
                            });
                            $(oMain).on("end_session", function() {
                                if(getParamValue('ctl-arcade') === "true"){
                                    parent.__ctlArcadeEndSession();
                                }
                                console.log('Game session ended');
                            });
                            $(oMain).on("save_score", function(evt,iMoney) {
                                if(getParamValue('ctl-arcade') === "true"){
                                    parent.__ctlArcadeSaveScore({score:iMoney});
                                }
                                console.log('Score saved:', iMoney);
                            });
                            $(oMain).on("show_interlevel_ad", function() {
                                if(getParamValue('ctl-arcade') === "true"){
                                    parent.__ctlArcadeShowInterlevelAD();
                                }
                            });
                            $(oMain).on("share_event", function(evt,iMoney) {
                                if(getParamValue('ctl-arcade') === "true"){
                                    parent.__ctlArcadeShareEvent({
                                        img:"200x200.jpg",
                                        title:TEXT_CONGRATULATIONS,
                                        msg:TEXT_SHARE_1 + iMoney + TEXT_SHARE_2,
                                        msg_share:TEXT_SHARE_3 + iMoney + TEXT_SHARE_4
                                    });
                                }
                            });

                            if(isIOS()){
                                setTimeout(function(){ sizeHandler(); }, 200);
                            } else {
                                sizeHandler();
                            }

                            console.log('✅ Jogo inicializado com sucesso!');
                        } catch (err) {
                            _bGameStarted = false;
                            console.error('❌ Falha ao iniciar CMain:', err);
                            setTimeout(function(){ startWithBalance(balance); }, 500);
                        }
                    }

                    // Inicia imediatamente com saldo em cache (não espera rede)
                    console.log('🎮 Iniciando jogo com saldo em cache');
                    startWithBalance(currentUser.balance);

                    if (window.customAuth.refreshUserBalance) {
                        var balanceTimeout = setTimeout(function(){
                            console.warn('⚠️ Timeout ao atualizar saldo — mantendo valor em cache');
                        }, 4000);
                        window.customAuth.refreshUserBalance(currentUser.id).then(function (balance) {
                            clearTimeout(balanceTimeout);
                            if (balance == null || !window.s_oGame || !window.s_oGame.syncWalletBalance) return;
                            window.s_oGame.syncWalletBalance(balance);
                        }).catch(function () {
                            clearTimeout(balanceTimeout);
                        });
                    }
                }

                waitAuthAndStart(0);
            });
        </script>
